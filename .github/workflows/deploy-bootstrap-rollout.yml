name: Deploy Bootstrap Rollout

on:
  push:
    branches:
      - master
    paths:
      - rollouts/bootstrap-5.json

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x

      - name: Install locked rollout dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validate migration contract
        run: |
          node scripts/rolling-self-update.mjs --validate-config --config-file rollouts/bootstrap-5.json
          npm audit --omit=dev --audit-level=high

      - name: Test rollout state machine
        run: npm run test:rollout

  rolling_update:
    needs: validate
    runs-on: ubuntu-22.04
    environment: production
    timeout-minutes: 45
    concurrency:
      group: peerbit-bootstrap-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x

      - name: Install locked rollout dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rolling self-update
        env:
          PEERBIT_ADMIN_KEY_B64: ${{ secrets.PEERBIT_ADMIN_KEY_B64 }}
        run: node scripts/rolling-self-update.mjs --config-file rollouts/bootstrap-5.json

      - name: Verify production DNS, TLS, identity, and WebSocket
        run: node scripts/monitor-relays.mjs
