name: Validate and deploy bootstrap config

on:
  pull_request:
    paths:
      - "bootstrap-*.env"
      - "static/**"
      - "scripts/**"
      - "package*.json"
      - "rollouts/**"
      - "tools/wrangler/**"
      - "wrangler.jsonc"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-bootstrap-rollout.yml"
      - ".github/workflows/monitor.yml"
  push:
    branches:
      - master
    paths:
      - "bootstrap-*.env"
      - "static/**"
      - "scripts/**"
      - "package*.json"
      - "rollouts/**"
      - "tools/wrangler/**"
      - "wrangler.jsonc"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy-bootstrap-rollout.yml"
      - ".github/workflows/monitor.yml"

permissions:
  contents: read

concurrency:
  group: bootstrap-config-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      static_changed: ${{ steps.static_changes.outputs.static_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x

      - name: Validate and build assets
        run: node scripts/build-bootstrap.mjs

      - name: Validate operational scripts
        run: |
          node --check scripts/verify-public.mjs
          node --check scripts/monitor-relays.mjs
          node --check scripts/rolling-self-update.mjs

      - name: Validate workflow syntax
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          archive="/tmp/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error --retry 3 \
            --output "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "$ACTIONLINT_SHA256  $archive" | sha256sum --check --strict
          mkdir -p /tmp/actionlint
          tar -xzf "$archive" -C /tmp/actionlint
          /tmp/actionlint/actionlint

      - name: Install locked rollout dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validate rollout dependency graph
        run: |
          npm run validate:rollout
          npm ls @peerbit/crypto @peerbit/server
          npm audit --omit=dev --audit-level=high

      - name: Test rollout state machine
        run: npm run test:rollout

      - name: Install locked Wrangler toolchain
        run: npm ci --ignore-scripts --no-audit --no-fund --prefix tools/wrangler

      - name: Validate Worker bundle
        run: tools/wrangler/node_modules/.bin/wrangler deploy --dry-run --outdir .wrangler-dry-run

      - name: Detect static deployment changes
        id: static_changes
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          changed="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          if rg --quiet '^(bootstrap-[^/]+\.env|static/.*|scripts/build-bootstrap\.mjs|tools/wrangler/.*|wrangler\.jsonc)$' <<<"$changed"; then
            echo "static_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "static_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && needs.validate.outputs.static_changed == 'true'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    concurrency:
      group: peerbit-bootstrap-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.x

      - name: Validate and build assets
        run: node scripts/build-bootstrap.mjs

      - name: Verify relays before publishing
        run: node scripts/monitor-relays.mjs

      - name: Install locked Wrangler toolchain
        run: npm ci --ignore-scripts --no-audit --no-fund --prefix tools/wrangler

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: tools/wrangler/node_modules/.bin/wrangler deploy

      - name: Verify production bytes, headers, and TLS
        run: >-
          node scripts/verify-public.mjs
          --base-url https://bootstrap.peerbit.org
          --attempts 60
          --delay-ms 5000
